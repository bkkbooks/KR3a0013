body:
  text: 傅子晉傅𤣥撰正心篇立徳之本莫尚乎正心心正而後身正身正而後左右正左右正而後朝廷正朝廷正而後國家正國家正而後天下正故天下不正修之國家國家不正修之朝廷朝廷不正修之左右左右不正修之身身不正修之心所修彌近而所濟彌逺禹湯罪已其興也勃焉正心之謂也心者神明之主萬理之統也動而不失正天地可感而况于人乎况于萬物乎夫有正心必有正徳以正徳臨民猶樹表望影不令而行大雅云儀刑文王萬邦作孚此之謂也有邪心必有枉行以枉行臨民猶樹曲表而望其影之直也若乃身坐廊廟之内意馳雲夢之野情繫曲房之娱臨朝宰事心與體離情與志乖形神且不相保孰左右之正乎忠正仁理存乎心則萬品不失其倫矣禮度儀法存乎體則逺邇内外咸知所則象矣古之君子修身治人先正其心自得而已矣夫能自得則無不得矣苟自失則無不失矣無不得者治天下有餘故否則保身居正終年不失其和達則兼善天下物無不得其所無不失者營妻子不足故否則是已非人而禍逮乎其身達則縱情用物而殃及乎天下昔者有虞氏彈五絃之琴而天下樂其和者自得也秦始皇築長城之基以為固禍機發于左右者自失也夫挾邪心以虐用天下則左右不可保亡秦是也秦之虐君目玩傾城之色天下男女怨曠而不肯恤也耳淫亡國之聲天下大小哀怨而不知撫也意盈四海之外口窮天下之味宫室造天而起萬國為之憔瘁猶未足以逞其欲惟不推心以况人乎故用是人如用草芥使用人如用已惡有不得其性者也古之達治者知心為萬事主動而無節則亂故先正其心其心正于内而後動静不妄動静不妄以率天下而後天下履正而咸保其性也斯逺乎哉求之心而已矣仁論篇古之仁人推所好以訓天下而民莫不尚徳推所惡以誡天下而民莫不知恥或曰恥者其至者乎曰未也夫至者自然由仁何恥之有赴谷必墜失水必溺人見之也赴穽必陷失道必沈人不見之也不察之故君子慎乎所不察不聞大論則志不宏不聴至言則心不固思唐虞于上世瞻仲尼于中古而知夫小道者之足羞也相伯夷于首陽省四皓于商山而知夫穢志者之足恥也存張騫于西極念蘇武于朔垂而知懷閭室者之足鄙也析斯類也無所不至矣徳比于上欲比于下徳比于上故知恥欲比于下故知足恥而知之則聖賢其可㡬知足而已則固陋其可安也聖賢斯㡬况其慝乎固陋斯安况其為侈乎是謂有檢純乎純哉其上也其次得概而已矣莫匪概也漸其概苟無邪斯可矣君子内省其身怒不亂徳善不亂義也子方惠及于老馬西巴不忍而放麑皆仁之端也推而廣之可以及乎逺矣案此另是一條與上不相屬舊本惟此數語疑上下尚有脱文義信篇盖天地著信而四時不悖日月著信而昬明有常王者體信而萬國以安諸侯秉信而境内以和君子履信而厥身以立古之聖君賢佐將化世美俗去信須臾而能安上治民者未之有也象天則也履信思順以壹天下此王者之信也據法持正行以不貳此諸侯之信也言出乎口結乎心守以不移立其身此君子之信也講信修義而人道定矣君不信以御臣臣不信以奉君父不信以教子子不信以事父夫不信以遇婦婦不信以承夫則君臣相疑于朝父子相疑于家夫婦相疑于室大小溷然而懷姦謀上下紛然而競相欺人倫于是亡矣夫信由上結者也故人君以信訓其臣則臣以信忠其君父以信誨其子則子以信孝其父夫以信遇其婦則婦以信順其夫上秉常以化下下服常以應上其不化者百未有一也夫為人上竭至誠開信以待下則懷信者歡然而樂進不信者赧然而迴意矣老子不云乎信不足焉者有不信也故以信待人不信思信不信待人信思不信况本無信者乎先王欲下之信也故示之以款誠而民莫欺其上申之以禮教而民篤于義矣夫以上接下而以不信随之是以日夜見災也周幽以詭烽滅國齊襄以𤓰時致殺非其顯乎故禍莫大于無信無信則不知所親不知所親則左右盡已之所疑况天下乎信者亦疑不信亦疑則忠誠者喪心而結舌懷姦者飾邪以自納矣此無信之禍也通志篇夫能通天下之志者莫大乎至公能行至公者莫要乎無忌心惟至公故近者安焉逺者歸焉枉直取正而天下信之惟無忌心故進者自盡而退不懷疑其道泰然後浸潤之譖不敢千也虞書曰闢四門則天下之人樂為之視矣達四聰則天下之人樂為之聴矣江海所以能為百谷王者以其能不逆之也苟有所逆衆流不至者多矣衆流不至者多則無以成其深矣夫有公心必有公道有公道必有公制丹朱商均子也不肖堯舜黜之管叔蔡叔弟也為惡周公誅之苟不善雖子弟不赦則于天下無所私矣鯀亂政舜殛之禹明聖舉用之戮父而授其子則于天下無所枉矣石厚子也石碏誅之冀缺讎也晉侯舉之是謂公道夫在人上天下皆為之用無逺無近苟所懷無逺無近死命可致也惟患衆流異源清濁不同愛惡相攻而吉凶生離疏黨别上之人或有所好之流獨進而所不好之流退矣通者一而塞者萬則公道廢而私道行矣于是天下之志塞而不通欲自納者因左右而達則權移左右而上勢分矣昧于利者知趣左右之必通必變業以求進矣昧于利者案此句與上文昧于利者句疑俱有舛誤變業而黨成正人守志而日否則雖見者盈庭而上所聞實寡矣外倦于人而内寡聞此自閉之道也故先王之教進賢者為上賞蔽賢者為上戮順禮者進􅊇法者誅設誹謗之木容狂狷之士任公而去私内恕而無忌是謂公制也公道行則天下之志通分制立則私曲之情塞矣凡有血氣苟不相順皆有争心隠而難分微而害深者莫甚于言矣君人者將和衆定民而殊其善惡以通天下之志者也聞言不可不審也聞言未審而以定善惡則是非有錯而飾辯巧言之流起矣故聴言不如觀事觀事不如觀行聴言必審其本觀事必校其實觀行必考其迹參三者而詳之近少失矣問曰漢之官制皆用秦法秦不二世而滅漢二十餘世而後亡者何也答曰其制則同用之則異秦任私而有忌心法峻而惡聞其失任私則逺者怨有忌心則天下疑法峻則民不順之惡聞其失則過不上聞此秦之所以不二世而滅者也漢初入秦約法三章論功定賞先封所憎無忌也雖網漏吞舟而百姓安之者能通天下之志得其略也世尚寛簡尊儒貴學政雖有失能容直臣簡則不苟寛則衆歸之尊儒貴學則篤于義能容直臣則上之失不害于下而民之所患上聞矣自非聖人焉能無失失而能改則所失少矣心以為是故言行由之其或不是不自知也先王患人之不自知其失而處尊者天下之命存焉順之則生逆之則死順而無節則諛進逆而畏死則直道屈明主患諛已者衆而無由聞失也故開敢諫之路納逆已之言苟所言出于忠誠雖事不盡是猶歡然受之所以通直言之塗引而致之非為名也以為直言不聞則已之耳目塞耳目塞于内諛者順之于外此三季所以至亡而不自知也周昌比髙祖于桀紂而髙祖託以愛子周亞夫申軍令而太宗為之不驅朱雲折檻辛慶忌叩頭流血斯乃寛簡之風漢所以歴年四百也舉賢篇賢者聖人所與共治天下者也故先王以舉賢為急舉賢之本莫大正身而一其聴身不正聴不一則賢者不至雖至不為之用矣古之明君簡天下之良才舉天下之賢人豈家至而户閲之乎開至公之路秉至平之心執大象而致之亦云誠而已矣夫任誠天地可感而况于人乎傅説巖下之築夫也髙宗引而相之吕尚屠釣之賤老也文武尊而宗之陳平項氏之亡臣也髙祖以為腹心四君不以小疵忘大徳三臣不以疏賤而自疑其建帝王之業不亦宜乎文王内舉周公旦天下不以為私其子外舉太公望天下稱其公周公誅弟而典刑立桓公任讎而齊國治苟其無私他人與骨肉其于誅賞豈二法哉惟至公然後可以舉賢也夏禹有言知人則哲惟帝其難之因斯以談君莫賢于髙祖臣莫竒于韓信髙祖之在巴漢困矣韓信去楚而亡窮矣夫以髙祖之明困而思亡士信之竒才窮而願進其相遭也宜萬里響應不移景而將相可取矣然信歸漢歴時而不見知非徒不見知而已矣又將案法而誅向不遇滕公而誅之則身不免于戮死不值蕭何則終不離于亡命幸而得存固水濱之餓夫市中之怯子也又安得市人可驅而立半天下之功也哉蕭何一言而不世之交合定項之功立豈蕭何知人之明絶于髙祖而韓信求進之意曲于蕭何乎尊卑之勢異而髙下之處殊也髙祖勢尊而處髙故思進者難進蕭何勢卑而處下故自納者易納然則居尊髙之位者其接人之道固難而在卑下之地者其相知之道固易矣昔世知居上取士之難故虚心而下聴知在下相接之易故因人以致人舜之舉皋陶難得皋陶致天下之士易湯之舉伊尹難得伊尹致天下之士易故舉一人而聴之者王道也舉二人而聴之者霸道也舉三人而聴之者僅存之道也聴一人何以王也任明而致信也聴二人何以霸也任術而設疑也聴三人何以僅存也從二人而求一也明主任人之道也專致人之道也博任人之道專故邪不得間致人之道博故下無所壅任人之道不專則讒説起而異心生致人之道不博則正途塞而良材屈使舜未得臯陶湯未得伊尹而不求賢則上下不交而大業廢矣既得皋陶伊尹而又人人用耳目是代大匠斲也君臣易位勞神之道也今之人或抵掌而言稱古多賢忠患世無人退不自三省而坐誣一世豈不甚耶夫聖人者不世而出也賢能之士何世無之何以知其然舜興而五臣顯武王興而九賢進齊桓之霸管仲為之謀秦孝之强商君佐之以法欲王則王佐至欲霸則霸臣出欲富國强兵則富國强兵之人往求無不得唱無不和是以知天下之不乏賢也顧求與不求耳何憂天下之無人哉重爵禄篇爵禄者國柄之本而富貴之所由不可以不重也然則爵非其徳不授禄非其功不與二教既立則良士不敢以賤徳受貴爵勞臣不敢虚干爵禄之制乎然則先王之用爵禄不可謂輕矣夫爵者位之級而禄者官之實也級有等而稱其位實足利而周其官此立爵禄之分也爵禄之分也定必明選其人而重用之徳貴功多者受重爵大位厚禄尊官徳淺功寡者受輕爵小位薄禄卑官厚足以衛宗黨薄足以代其耕居官奉職者生而食于人不敢以私利經心既受禄于官而或營私則公法繩之于上而顯議發之于下矣是以仁讓之教存亷恥之化行貪鄙之路塞嗜欲之情滅百官各敬其職大臣論道于朝公議日興而私利日廢也明矣必善制而後致治非善制之能獨治也必須良佐有以行之也欲治其民而不省其事則事繁而職亂知省其職而不知節其利厚其禄也則下力既竭而上猶未供薄其禄也則吏競背公利而營私利也此教之所以必廢而不行也凡欲為治者無不欲其吏之清也不知所以致清而求其清此猶渾其源而望其流之潔也知所以致清則雖舉盜跖不敢為非不知所以致清則雖舉夷叔必犯其制矣夫授夷叔以事而薄其禄近不足以濟其身逺不足以及室家父母餓于前妻子餒于後不營則骨肉之道虧營之則奉公之制犯骨肉之道虧則怨毒之心生仁義之理衰矣使夷叔有父母存無以致養必不採薇于首陽顧公制而守死矣由此言之吏禄不重則夷叔必犯矣夫棄家門委身于公朝榮不足以庇宗人禄不足以濟家室骨肉怨于内交黨離于外仁孝之道虧名譽之利損能守志而不移者鮮矣人主不詳察聞怨興于内而交離于外薄其名必將黜其身矣家困而身黜不移之士不顧私聞之怨不憚逺近之謫死而後已不改其行上不見信于君下不見明于俗委死溝壑而終莫之能知也豈不悲夫天下之人知為清之若此則改行而從俗矣清者化而為濁善者變而陷于非若此而能以致治者未之有也禮樂篇傅子曰能以禮教興天下者其知大本之所立乎夫大本者與天地並存與人道俱設雖蔽天地不可以質文益損變也大本有三一曰君臣以立邦國二曰父子以定室家三曰夫婦以别内外三本者立則天下正三本不立則天下不可得而正天下不可得而正則有國家者亟亡而立人之道廢矣禮之大本存乎三者可不謂之近乎用之而蔽天地可不謂之逺乎由近以知逺推已以况人此禮之情也商君始殘禮樂至于始皇遂滅其制賤九族破五教獨任其威刑酷暴之政内去禮義之教外無列國之輔曰縱桀紂之淫樂君臣競留意于刑書雖荷㦸百萬方石城造案此句疑有舛誤子已死于外矣胡亥不覺二年而滅無盡忠效節之臣以救其難豈非敬義不立和愛先亡之分也哉禮義者先王之藩衛也秦廢禮義是去其藩衛也夫齋不貲之寳獨宿于野其為危毁甚于累卵方之于秦猶有泰山之安易曰上慢下暴盜思伐之其秦之謂乎貴教篇虎至猛也可威而服鹿至麤也可教而使木至勁也可柔而屈石至堅也可柔而用况人含五常之性有善可因有惡可攻者乎人之所重莫重乎身貴教之道行士有仗節成義死而不顧者矣此先王因善教義因義而立禮者也因善教義成而禮行因義立禮設而義通若夫商韓孫吳知人性之貪得樂進而不知兼濟其善于是束之以法要之以功使天下惟力是恃惟争是務恃力務争至有探湯赴火而忘其身者好利之心獨用也懷好利之心則善端沒矣中國所以常制四夷者禮義之教行也失其所以教則同乎夷矣失其所以同則同乎禽獸矣不惟同乎禽獸亂將甚焉何者禽獸保其性然者也人以智役力也以智役力而無教節是智巧日用而相殘無極也相殘無極亂孰大焉不濟其善而惟力是恃其不大亂㡬希耳人之性避害從利故利出于禮讓則修禮讓案原本無則修禮讓句據下文知是脱誤今増利出于力争則任力争修禮讓則上安下順而無侵奪任力争則父子㡬乎相危而况于悠悠者乎檢商賈篇夫商賈者所以沖盈虚而權天地之利通有無而一四海之財其人可甚賤而其業不可廢盖衆利之所死而積偽之所生不可不審察也古者民樸而化淳上少欲而下尠偽衣足以暖身食足以充口器足以給用居足以避風雨養以大道而民樂其生敦以大質而下無逸心日中為市交易而退各得其所盖化淳也暨周世殷盛承變極文而重為之防國有定制下供常事役賦有常而業不廢君臣相與一體上下譬之形影官恕民忠而恩侔父子上不徵非常之物下不供非常之求君不索無用之寳民不鬻無用之貨自公侯至于皁𨽻僕妾尊卑殊禮貴賤異等萬㡬運于上百事動于下而六合晏如者分數定也夫神農正其綱先之以無欲而咸安其道周綜其目壹之以中正而民不越及秦亂四民而棄本業苟且一切之風起矣于是士樹姦于朝賈窮偽于市臣挾邪以罔其君子懷利以詐其父一人唱欲而億兆和上逞無厭之欲下充無極之求都有專市之賈邑有傾世之商商賈富半公室農夫伏隴畝而墜溝壑上愈増無常之好以徴于下下窮死而不知歸農末流濫溢而本源竭纖靡盈市而榖帛罄其勢然也古者言非典義學士不以樂心事非田桑農夫不以亂業器非時用工人不以措手物非世資商賈不以過市士思其訓農思其務工思其用賈思其常是以用足而不匱故一野不如一市一市不如一朝一朝不如一用一用不如上息欲上息欲而下反真矣不息欲于上而欲求下之安此猶縱火焚林而索原野之不彫瘁難矣故明君止欲而寛下急農而緩商貴本而賤末朝無蔽賢之臣市無專利之賈國無擅山澤之民一臣蔽賢則上下之道壅一商賈利則四方之資困民擅山澤則幷兼之路開而上以無常役下賦物非民所生而請于商賈則民財日暴賤民財暴賤而非常暴貴非常暴貴則本竭而末盈末盈本竭而國富民安者未之有也校工篇天下害莫甚于女飾上之人不節其耳目之欲殫生民之巧以極天下之變一首之飾盈千金之資婢妾之服兼四海之珍縱欲者無窮用欲者有盡以有盡之力逞無窮之欲此漢靈之所以失其民也上欲無節衆下肆情淫奢並興而百姓受其殃毒矣嘗見漢末一筆之柙雕以黄金飾以和璧綴以隨珠發以翠羽此筆非文犀之植必象齒之管豐狐之柱秋兔之翰用之者必被珠繡之衣踐雕玉之履由是推之極靡不至矣然公卿大夫刻石為碑鐫石為虎碑崇偽案此句疑有脱誤陳于三衢妨功䘮徳異端並起衆邪之亂正若此豈不哀哉夫經國立功之道有二一曰息欲二曰明制欲息制明天下定矣戒言篇上好徳則下修行上好言則下飾辯大偽起焉此必然之徴也徳者難成而難見者也言者易撰而易悦者也先王知言之易而悦之者衆故不尚焉不尊賢尚徳舉善以教而以一言之悦取人則天下之棄徳飾辯以要其上者不尠矣何者徳難為而言易飾也夫貪榮重利常人之性也上之所好榮利存焉故上好之下必趣之趣之不已雖死亡不避也先王知人有好善尚徳之性而又貪榮而重利也故貴其所尚而抑其所貪貴其所尚則禮讓興抑其所貪則亷恥存夫榮利者可抑而不可絶也故明為顯名髙位豐禄厚賞使天下希而慕之不修行崇徳則不得此名不居此位不食此禄不獲此賞此先王立教之大體也夫徳修之難不積其實不成其名夫言撰之易合所悦而大用修之不久所悦無常故君子不貴也假言篇天地至神不能同道而生萬物聖人至能不能一檢而治百姓故以異致同者天地之道也因物制宜者聖人之治也既得其道雖有詭常之變相害之物不傷乎治體矣夫水火之性相滅也善用之者陳釡鼎乎其間煮之而能兩全其用無害也五味以調百品以成天下之物為水火者多矣若施釡鼎乎其間則何憂乎相害何患乎不盡其用也問政篇劉子問政傅子曰政在去私私不去則公道亡公道亡則禮教無所立禮教無所立則刑罰不用情刑罰不用情而下從之者未之有也夫去私者所以立公道也惟公然後可正天下也善為政者天地不能害也而况于人乎堯水湯旱而民菜色猶太平也不亦美乎晉饑吳懈而為秦越人且害之而况于天下乎治體篇治國有二柄一曰賞二曰罰賞者政之大徳也罰者政之大威也人所以畏天地者以其能生而殺之也為治審持二柄能使生殺不妄則威徳與天地並矣授職篇夫裁徑尺之帛攻方寸之木不任左右必求良工者裁帛攻木非左右之所能故也徑尺之帛方寸之木薄物也非良工不能裁之况帝王之佐經國之任可不審擇其人乎夫搆大厦者先擇匠然後簡材治國家者先擇佐然後定民大匠搆屋必大材為棟梁小材為榱橑苟有所中尺寸之木無棄也非獨屋有棟梁國家亦然大徳為宰相此國家之棟梁經國之本立則庶官無曠天工時叙矣官人篇世質則官少世文則吏多有虞氏官五十夏后氏百殷二百周三百曲制篇天下之福莫大于無欲天下之禍莫大于不知足無欲則無求無求者所以成其儉也不知足者則物莫能盈其欲矣信直篇古之賢君樂聞其過故直言得至以補其闕古之忠臣不敢隠君之過故有過者知所以改其或不改以死繼之不亦至直乎至矣哉季文子之事君也使惡人不得行境内况在其君之側乎推公心而行直道有臣若此其君希陷乎不義矯違篇傅子曰正道之不得行常由佞人亂之也故桀信其佞臣推侈以殺其正臣關龍逢而夏以亡紂信其佞臣惡來以剖其正臣王子比千之心而殷以亡問刑篇秦始皇之無道豈不甚哉視殺人如殺狗彘狗彘仁而用之猶有節始皇之殺人觸情而已其不以道如是李斯又深刻峻法随其指而妄殺人秦不二世而滅李斯無遺類以不道愚人人亦以不道報之人讎之天絶之行無道未有不亡者也安民篇夫彈枉正邪糾其不法擊一以警百者刺史之職也法刑篇是故聖帝明王惟刑之恤惟敬五刑以成三徳若乃暴君昏主刑殘法酷作五虐之刑詔炮烙之辟而天下之民無所措手足矣平役賦篇上不舉非常之賦下不進非常之貢上下同心以奉常教民雖輸力致財而莫怨其上者所務公而制有常也鏡總叙篇古之人目短于自見故以鏡觀面智短于自知故以道正已鏡無見疵之罪道無明過之惡面失鏡則無以正鬚眉身失道則無以知迷惑附録積薪若山縱火其下火未及然一盂之水尚可滅也及至火猛風起烟火行天雖傾竭海不能救秦昭王是積薪而縱火其下至始皇而方熾二世起風而滅之秦人觀山東之民猶猛虎之睨羣羊傅子曰太祖將征栁城張遼諫曰夫許天下之㑹也今天子在許公逺北征若劉表遣劉備襲許據之以號令四方公之勢去矣太祖䇿表必不能任備遂行也或問近世大賢君子若荀令君之仁荀軍師之智其可謂近世大賢人士君子矣荀令君仁立徳明以舉賢行無諂瀆謀能應機孟軻稱五百年而有王者其間必有名世者其荀令君乎夏令被裘冬令被葛雖有嚴令終不肯從者逆時也堯遭洪水而貴陸湯遭大旱而重水列和善吹笛吳姬之聲無以加也以上六條永樂大典中録出懸千金于市市人不敢取者分定也委一金于路兒童争之者分不定也朱生善彈琴琵琶雖伯牙之妙無加也以上二條見諸子瓊林上徳之人其齊萬物也猶天之有春秋時至自生非徳之力聖人之道如天地諸子之異如四時四時相反天地合而通之君子審其宗而後學明其道而後行人之性如水焉置之圓則圓置之方則方澄之則淳而清動之則流而濁心有管籥須言而發傅子擬金人銘作口銘曰神以感通心由口宣福生有兆禍生有端情莫多妄口莫多言蟻孔僨河溜沈瀨山病從口入禍從口出存亡之機開闔之術口與心謀安危之源樞機之發榮辱存焉鴨足何以眅雞足何以􅀈案販字無鴨足之義􅀈字字書所無攷字典有􅡘字肉也又有􅀈字脈也或傅子本取鴨足有肉相聨屬雞四爪如脈絡分散之義亦未可知眅􅀈疑即􅡘􅀈之訛今無别本可校姑仍原文眅􅀈吾不知也何况問天地乎夢攀日月覺而不上天庭夢入九泉寤而不及地下髙宗得説偶中耳三公者佐天子理隂陽荀仲預稱禹十二為司空律是咎繇遺訓漢命蕭何廣之若親貴犯罪大者必議小者必赦是縱封豕于境内放長蟲于左右也先王之制九州異賦天不生地不養君子不以為禮若河内諸縣去北山絶逺而各調出御上黨真人參上者十斤下者五十斤所調非所生民以為患陸田者命懸于天也人力雖修水旱不時則一年之功棄矣田制之由人人力苟脩則地利可盡天時不如地利地利不如人和或問劉歆劉向孰賢傅子曰向才學俗而志忠歆才學通而行邪詩之雅頌書之典謨文質足以相副玩之若近尋之益逺陳之若肆研之若隠浩浩乎其文章之淵府也管寧之遼東而歸海中遇暴風餘船皆破惟寧船自若夜晦船人盡惑莫知泊所忽望見火光趣之得島一門人忿然曰君責人亦大無道理今闇如漆何以不把火照我當得覓鑽火具劉備襲蜀丞相掾趙㡬曰劉備其不濟乎拙于用兵每戰每敗奔亡不暇何以圖人徵士傅朝曰劉備寛仁有度能得人死力諸葛亮達治知變正有謀而為之相張飛關羽勇而有義皆萬人之敵而為之將此三人者皆人􅇐也以劉備之略三杰佐之何為而不濟也劉曄責楊暨曰夫釣者中大魚則縱而随之須可制而後牽之則無不得也人主之威豈徒大魚而已乎子誠直臣然計不足不可不深思也有惡劉曄于魏明帝謂曄不盡忠善伺上意所趣而合之帝如言以驗之果得情從此疎焉曄遂發狂出為大鴻臚以憂死諺曰巧詐不如拙誠信矣曹大司馬之勇賁育弗如也王黎為黄門郎軒軒然得志煦煦然自樂太祖武皇帝魏武帝愍嫁娶之僭上公主適人不過皁帳幍先未有岐荀文若巾觸樹成岐時人慕之因而弗改今通為慶弔之服白紗為之或單或裌初婚冠送餞亦服之梁冀作火浣布單衣㑹賔客行酒食盃而汚之偽怒解衣而燒之垢盡火滅粲然潔白漢末王公多以幅巾為雅是以袁紹之徒雖為將帥皆著縑巾太原民發冢破棺中有婦人將出與語生人也視其冢上木生三十嵗不知此婦三十嵗尚生地中也將一朝歘然生偶與發冢有㑹也相者三停九候定于一尺之面郝素善彈筝雖伯牙妙手吳姬竒聲何以加之西國人言蘇合獸便也中國皆以為香金根車天子親耕乗之蹋楮車畋獵乘之有追鋒車施通幰車舊機五十綜者五十躡六十綜者六十躡馬生者天下之名巧也患其遺日喪功乃皆易以十二躡其竒文異變用感而作馬先生鈞天下之巧者也二子謂古無指南車記言之虚也先生曰古有之二子以白明帝詔先生作之而指南車成此一異也從是天下服其巧矣居京都城内有地可為園患無水以溉之先生乃作翻車令兒童轉之而灌水自覆其功百倍于常此二異也後人有上百戲者能設而不能動帝以問先生可動否鈞曰可動帝曰其巧可益否對曰可益受詔作之以大木雕構使形若輪平潛以自入設為女樂無象使木人擊鼔吹簫跳丸擲出自入百官行署變巧百端此三異也先生見諸葛連弩曰巧則巧矣未盡善也言作之可令加五倍嘗試一車輪懸瓴甓數十飛之數百歩馬先生之巧雖古般輸墨翟王爾漢世張平子不能過也以上三十三條見太平御覧漢武元光初郡國舉孝亷元封五年舉秀才歴世相承皆向郡國稱故吏周文王子公旦有聖徳諡曰文二漢之臣爛如三辰之附長天道教者昭昭然若日月麗乎天侍中冠武弁昔仲尼既沒仲尼之徒追論夫子之言謂之論語其後鄒之君子孟子輿擬其體著七篇謂之孟子魏司空陳羣始立九品之制置中正平人材之髙下各為輩目州置州都而總其義以上七條見文選註傅子
