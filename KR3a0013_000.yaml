body:
  text: 傅子目録儒家類正心仁論義信通志舉賢重爵禄禮樂貴教檢商賈校工戒言假言問政治體授職官人曲制信直矯違問刑安民法刑平役賦鏡總叙附録四十八條臣等謹案傅子晉司𨽻校尉鶉觚子北地傅𤣥撰晉書本傳稱𤣥撰論經國九流及三史故事評斷得失各為區例名為傅子為内外中篇凡有四部六録合百四十首數十萬言行世𤣥初作内篇成以示司空王沈沈與𤣥書曰省足下所著書言富理濟經綸政體存重儒教足以塞楊墨之流遁齊荀孟于往代其為當時所重如此隋書經籍志唐書藝文志皆載有傅子一百二十卷是唐世其書尚完至宋而崇文總目所録止存二十三篇較之原目已亡一百一十七篇故宋藝文志僅載有五卷其後惟尤袤遂初堂書目尚見其名至元明以後蔵書家遂絶無著録者盖傳本久佚世所見者獨藝文類聚太平御覽諸書所引寥寥數條而已今檢永樂大典中散見頗多且所標篇目咸在謹采掇裒次得文義完具者十有二篇曰正心曰仁論曰義信曰通志曰舉賢曰重爵禄曰禮樂曰貴教曰檢商賈曰校工曰戒言曰假言又文義未全者十二篇曰問政曰治體曰授職曰官人曰曲制曰信直曰矯違曰問刑曰安民曰法刑曰平役賦曰鏡總叙篇目視崇文總目較多其一疑問刑法刑本一篇而永樂大典誤分為二其宋志五卷原第已不可攷謹依文編綴總為一卷其有大典失載篇目及他書所徵引者復蒐輯得四十餘條當即前篇闕佚之文顧未敢以意附㑹則别為附録繫之于後晉代子家今傳于世者惟張華博物志干寳捜神記葛洪抱朴子嵇含草木狀戴凱之竹譜尚存然博物志搜神記皆經後人竄改已非原書草木狀竹譜記録瑣屑無關名理抱朴子又多道家詭誕之説不能悉軌于正獨𤣥此書所論皆關切治道闡啓儒風精意名言往往而在以視論衡昌言皆當過之惜其全本世已無存而殘編斷簡收拾于缺爛之餘者尚得以攷見其什一是亦可為寳貴也乾隆四十六年正月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
